<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network+ — Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    #app { width: 100%; max-width: 700px; }

    /* ── Header ── */
    .quiz-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .back-btn {
      color: #64748b;
      text-decoration: none;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.15s;
    }
    .back-btn:hover { color: #94a3b8; }

    .topic-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #4f8ef7;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-left: auto;
    }

    /* ── Progress ── */
    .progress-bar-wrap {
      background: #1e2231;
      border-radius: 99px;
      height: 6px;
      margin-bottom: 0.6rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #4f8ef7;
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 1.5rem;
    }

    /* ── Question card ── */
    .question-card {
      background: #1e2231;
      border: 1px solid #2d3348;
      border-radius: 14px;
      padding: 1.75rem 2rem;
    }

    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.55;
      color: #f1f5f9;
      margin-bottom: 1.5rem;
    }

    .options { display: flex; flex-direction: column; gap: 0.65rem; }

    .option {
      background: #131720;
      border: 1.5px solid #2d3348;
      border-radius: 10px;
      padding: 0.85rem 1.1rem;
      cursor: pointer;
      font-size: 0.93rem;
      line-height: 1.45;
      transition: border-color 0.12s, background 0.12s;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .option:hover:not(.locked) {
      border-color: #4f8ef7;
      background: #1a2540;
    }

    .option .opt-letter {
      font-weight: 700;
      color: #4f8ef7;
      min-width: 1.1rem;
      flex-shrink: 0;
    }

    .option.correct {
      border-color: #22c55e;
      background: #052e16;
    }
    .option.correct .opt-letter { color: #22c55e; }

    .option.wrong {
      border-color: #ef4444;
      background: #2a0a0a;
    }
    .option.wrong .opt-letter { color: #ef4444; }

    .option.reveal {
      border-color: #22c55e;
      background: #052e16;
      opacity: 0.7;
    }
    .option.reveal .opt-letter { color: #22c55e; }

    /* ── Explanation ── */
    .explanation {
      margin-top: 1.25rem;
      padding: 1rem 1.1rem;
      background: #0f1723;
      border-left: 3px solid #4f8ef7;
      border-radius: 0 8px 8px 0;
      font-size: 0.88rem;
      color: #94a3b8;
      line-height: 1.6;
      display: none;
    }
    .explanation.show { display: block; }
    .explanation strong { color: #cbd5e1; }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .btn {
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #3b7de8; }
    .btn:disabled { background: #2d3348; color: #475569; cursor: default; }

    /* ── Results screen ── */
    #results { display: none; }

    .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 6px solid #4f8ef7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .score-circle .score-num {
      font-size: 2rem;
      font-weight: 800;
      color: #f1f5f9;
      line-height: 1;
    }

    .score-circle .score-denom {
      font-size: 0.85rem;
      color: #64748b;
    }

    .result-title {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.4rem;
    }

    .result-sub {
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .review-list { display: flex; flex-direction: column; gap: 1rem; }

    .review-item {
      background: #1e2231;
      border: 1px solid #2d3348;
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
    }

    .review-item .review-q {
      font-size: 0.9rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }

    .review-item .review-your {
      font-size: 0.83rem;
      color: #ef4444;
      margin-bottom: 0.2rem;
    }

    .review-item .review-correct {
      font-size: 0.83rem;
      color: #22c55e;
      margin-bottom: 0.5rem;
    }

    .review-item .review-explain {
      font-size: 0.82rem;
      color: #64748b;
      line-height: 1.55;
      border-top: 1px solid #2d3348;
      padding-top: 0.5rem;
    }

    .result-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #4f8ef7;
      color: #4f8ef7;
      border-radius: 8px;
      padding: 0.65rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }
    .btn-outline:hover { background: #1a2540; }

    .all-correct .score-circle { border-color: #22c55e; }
    .all-correct .score-num { color: #22c55e; }
  </style>
</head>
<body>
<div id="app">

  <!-- Quiz screen -->
  <div id="quiz">
    <div class="quiz-header">
      <a class="back-btn" href="index.html">← All Modules</a>
      <span class="topic-label" id="topic-label"></span>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text"></div>

    <div class="question-card">
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options"></div>
      <div class="explanation" id="explanation"></div>
    </div>

    <div class="btn-row">
      <button class="btn" id="next-btn" disabled>Next →</button>
    </div>
  </div>

  <!-- Results screen -->
  <div id="results">
    <div class="quiz-header">
      <a class="back-btn" href="index.html">← All Modules</a>
      <span class="topic-label" id="results-label"></span>
    </div>

    <div class="question-card" id="score-card">
      <div class="score-circle" id="score-circle">
        <span class="score-num" id="score-num"></span>
        <span class="score-denom" id="score-denom"></span>
      </div>
      <div class="result-title" id="result-title"></div>
      <div class="result-sub" id="result-sub"></div>

      <div class="review-list" id="review-list"></div>

      <div class="result-actions">
        <button class="btn" onclick="restartQuiz()">↺ Retry</button>
        <a class="btn-outline" href="index.html">All Modules</a>
      </div>
    </div>
  </div>

</div>

<script src="data.js"></script>
<script src="data-02.js"></script>
<script src="data-03.js"></script>
<script src="data-04.js"></script>
<script src="data-05.js"></script>
<script src="data-06.js"></script>
<script src="data-07.js"></script>
<script src="data-08.js"></script>
<script src="data-09.js"></script>
<script src="data-10.js"></script>
<script src="data-11.js"></script>
<script src="data-12.js"></script>
<script src="data-mixed-1.js"></script>
<script src="data-mixed-2.js"></script>
<script src="data-mixed-3.js"></script>
<script src="data-mixed-4.js"></script>
<script src="data-mixed-5.js"></script>
<script>
  // ── Init ──────────────────────────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const topicId = params.get("topic");

  const topic = TOPICS.find(t => t.id === topicId);
  const questions = QUESTIONS[topicId];

  if (!topic || !questions || questions.length === 0) {
    document.body.innerHTML = `<div style="text-align:center;padding:4rem;color:#94a3b8">
      Module not found. <a href="index.html" style="color:#4f8ef7">← Go back</a></div>`;
    throw new Error("Topic not found");
  }

  document.title = `Quiz — ${topic.title}`;
  document.getElementById("topic-label").textContent = topic.title;
  document.getElementById("results-label").textContent = topic.title;

  // Shuffle questions for variety
  const shuffled = [...questions].sort(() => Math.random() - 0.5);

  let current = 0;
  let score = 0;
  const userAnswers = new Array(shuffled.length).fill(null);

  // ── Render question ───────────────────────────────────────────────────────
  function render() {
    const q = shuffled[current];
    const letters = ["A", "B", "C", "D"];

    // Progress
    document.getElementById("progress-fill").style.width =
      `${(current / shuffled.length) * 100}%`;
    document.getElementById("progress-text").textContent =
      `Question ${current + 1} of ${shuffled.length}`;

    // Question
    document.getElementById("question-text").textContent = q.q;

    // Options
    const optContainer = document.getElementById("options");
    optContainer.innerHTML = "";
    q.options.forEach((text, i) => {
      const div = document.createElement("div");
      div.className = "option";
      div.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${text}</span>`;
      div.addEventListener("click", () => selectAnswer(i));
      optContainer.appendChild(div);
    });

    // Explanation
    const exp = document.getElementById("explanation");
    exp.classList.remove("show");
    exp.innerHTML = "";

    // Next button
    const btn = document.getElementById("next-btn");
    btn.disabled = true;
    btn.textContent = current === shuffled.length - 1 ? "See Results" : "Next →";
  }

  // ── Select answer ─────────────────────────────────────────────────────────
  function selectAnswer(chosen) {
    if (userAnswers[current] !== null) return; // already answered

    userAnswers[current] = chosen;
    const q = shuffled[current];
    const opts = document.querySelectorAll(".option");

    opts.forEach(o => o.classList.add("locked"));

    if (chosen === q.answer) {
      score++;
      opts[chosen].classList.add("correct");
    } else {
      opts[chosen].classList.add("wrong");
      opts[q.answer].classList.add("reveal");
    }

    // Show explanation
    const exp = document.getElementById("explanation");
    exp.innerHTML = `<strong>Explanation:</strong> ${q.explain}`;
    exp.classList.add("show");

    document.getElementById("next-btn").disabled = false;
  }

  // ── Next / finish ─────────────────────────────────────────────────────────
  document.getElementById("next-btn").addEventListener("click", () => {
    current++;
    if (current < shuffled.length) {
      render();
    } else {
      showResults();
    }
  });

  // ── Results ───────────────────────────────────────────────────────────────
  function showResults() {
    document.getElementById("quiz").style.display = "none";
    document.getElementById("results").style.display = "block";

    const total = shuffled.length;
    const pct = Math.round((score / total) * 100);

    document.getElementById("score-num").textContent = score;
    document.getElementById("score-denom").textContent = `/ ${total}`;

    let title, sub;
    if (pct === 100) {
      title = "Perfect Score! 🎉";
      sub = "Flawless. You know this module cold.";
      document.getElementById("score-card").classList.add("all-correct");
    } else if (pct >= 80) {
      title = "Great Work! 👏";
      sub = `${pct}% — solid understanding. Review the misses below.`;
    } else if (pct >= 60) {
      title = "Getting There 💪";
      sub = `${pct}% — re-read the note and try again.`;
    } else {
      title = "Keep Studying 📖";
      sub = `${pct}% — go back to the notes, then retry.`;
    }

    document.getElementById("result-title").textContent = title;
    document.getElementById("result-sub").textContent = sub;

    // Wrong answers review
    const reviewList = document.getElementById("review-list");
    reviewList.innerHTML = "";
    const letters = ["A", "B", "C", "D"];

    shuffled.forEach((q, i) => {
      if (userAnswers[i] === q.answer) return; // skip correct ones
      const div = document.createElement("div");
      div.className = "review-item";
      div.innerHTML = `
        <div class="review-q">Q${i + 1}: ${q.q}</div>
        <div class="review-your">✗ Your answer: ${userAnswers[i] === null ? "—" : letters[userAnswers[i]] + ". " + q.options[userAnswers[i]]}</div>
        <div class="review-correct">✓ Correct: ${letters[q.answer]}. ${q.options[q.answer]}</div>
        <div class="review-explain">${q.explain}</div>`;
      reviewList.appendChild(div);
    });

    if (score === total) {
      reviewList.innerHTML = `<p style="text-align:center;color:#22c55e;padding:1rem 0">All answers correct — nothing to review!</p>`;
    }
  }

  // ── Retry ─────────────────────────────────────────────────────────────────
  function restartQuiz() {
    current = 0;
    score = 0;
    userAnswers.fill(null);
    shuffled.sort(() => Math.random() - 0.5);
    document.getElementById("results").style.display = "none";
    document.getElementById("quiz").style.display = "block";
    document.getElementById("score-card").classList.remove("all-correct");
    render();
  }

  // ── Start ─────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
