<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network+ — Quiz Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #160F13;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      max-width: 1000px;
      margin: 0 auto 2.5rem;
      background: linear-gradient(135deg, #7E0E23 0%, #B4122E 55%, #8A1020 100%);
      border: 1px solid #C8324B;
      border-bottom: 4px solid #E4A72A;
      border-radius: 16px;
      padding: 2.2rem 1.5rem;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.4);
    }

    header .eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #F5D283;
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-size: 2.1rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.5rem;
      color: #F3D6DB;
      font-size: 0.98rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #241821;
      border: 1px solid #3B2530;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .card:hover {
      border-color: #B4122E;
      background: #331C28;
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .card-body .topic-id {
      font-size: 0.75rem;
      font-weight: 700;
      color: #E4A72A;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-body .topic-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-top: 0.15rem;
    }

    .card-body .q-count {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.2rem;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: #475569;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Network Systems · Self-Paced Study</div>
  <h1>🌐 Network+ Quiz Hub</h1>
  <p>Pick a module and test yourself — 25 random questions per attempt</p>
</header>

<div class="grid" id="grid"></div>

<footer>Random questions each attempt &nbsp;·&nbsp; Instant scoring &nbsp;·&nbsp; Review wrong answers &nbsp;·&nbsp; Retry re-draws a new set</footer>

<script src="data.js"></script>
<script src="data-02.js"></script>
<script src="data-03.js"></script>
<script src="data-04.js"></script>
<script src="data-05.js"></script>
<script src="data-06.js"></script>
<script src="data-07.js"></script>
<script src="data-08.js"></script>
<script src="data-09.js"></script>
<script src="data-10.js"></script>
<script src="data-11.js"></script>
<script src="data-12.js"></script>
<script src="data-01-b.js"></script>
<script src="data-02-b.js"></script>
<script src="data-03-b.js"></script>
<script src="data-04-b.js"></script>
<script src="data-05-b.js"></script>
<script src="data-06-b.js"></script>
<script src="data-07-b.js"></script>
<script src="data-08-b.js"></script>
<script src="data-09-b.js"></script>
<script src="data-10-b.js"></script>
<script src="data-11-b.js"></script>
<script src="data-12-b.js"></script>
<script src="data-topup.js"></script>
<script src="data-topup-2.js"></script>
<script src="data-mixed-1.js"></script>
<script src="data-mixed-2.js"></script>
<script src="data-mixed-3.js"></script>
<script src="data-mixed-4.js"></script>
<script src="data-mixed-5.js"></script>
<script>
  const ICONS = {
    "01": "🖥️", "02": "🏢", "03": "📮", "04": "📡",
    "05": "🔌", "06": "📶", "07": "☁️", "08": "🧮",
    "09": "⚠️", "10": "🛡️", "11": "📈", "12": "🌍",
    "mixed-1": "🧪", "mixed-2": "🧪", "mixed-3": "🔬",
    "mixed-4": "🔥", "mixed-5": "🏆",
  };

  const MIXED_IDS = ["mixed-1","mixed-2","mixed-3","mixed-4","mixed-5"];

  const topicTopics = TOPICS.filter(t => !MIXED_IDS.includes(t.id));
  const mixedTopics = TOPICS.filter(t => MIXED_IDS.includes(t.id));

  const grid = document.getElementById("grid");

  function renderCards(list, labelText) {
    const section = document.createElement("div");
    section.style.cssText = "grid-column:1/-1;margin:1rem 0 0.25rem;";
    section.innerHTML = `<p style="font-size:0.8rem;font-weight:700;color:#E4A72A;text-transform:uppercase;letter-spacing:0.08em;border-left:3px solid #B4122E;padding-left:0.6rem">${labelText}</p>`;
    grid.appendChild(section);

    list.forEach(topic => {
      const qs = QUESTIONS[topic.id] || [];
      const attempt = attemptSizeFor(topic.id, qs.length);
      const countText = attempt < qs.length
        ? `${attempt} random of ${qs.length}`
        : `${qs.length} questions`;
      const a = document.createElement("a");
      a.className = "card";
      a.href = `quiz.html?topic=${topic.id}`;
      const label = MIXED_IDS.includes(topic.id) ? "Mixed" : `Module ${topic.id}`;
      a.innerHTML = `
        <div class="card-icon">${ICONS[topic.id] || "📋"}</div>
        <div class="card-body">
          <div class="topic-id">${label}</div>
          <div class="topic-title">${topic.title}</div>
          <div class="q-count">${countText}</div>
        </div>`;
      grid.appendChild(a);
    });
  }

  renderCards(topicTopics, "Chapter Quizzes");
  renderCards(mixedTopics, "Final Mixed Quizzes");
</script>
</body>
</html>
